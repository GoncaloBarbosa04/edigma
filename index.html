<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MUPI TUB — protótipo</title>

<!--
  ============================================================
  PROTÓTIPO MUPI — Transportes Urbanos de Braga
  ============================================================
  Ficheiro único, sem build. Abre no browser e funciona.

  Onde mexer:
    [1] TOKENS      — cores, espaçamentos, tipografia
    [2] DADOS       — paragem, linhas, chegadas, tarifário, campanhas
    [3] ESTADO      — máquina de estados (6 estados do descritivo)
    [4] ECRÃS       — cada função devolve o HTML de um ecrã
    [5] ARRANQUE    — timers, eventos, painel de desenvolvimento

  Modo kiosk (Windows):
    chrome.exe --kiosk --app="file:///C:/.../index.html"

  Painel de desenvolvimento: tecla D
  ============================================================
-->

<style>
/* ============================================================
   [1] TOKENS
   Toda a identidade visual vive aqui. Mudar uma variável muda
   o protótipo inteiro. Confirmar cores com o manual de marca
   dos TUB antes de fechar — estas são aproximações do logótipo.
   ============================================================ */
:root {
  /* Marca */
  --tub-azul:        #0072BC;
  --tub-azul-escuro: #00548A;
  --tub-vermelho:    #E30613;

  /* Superfícies */
  --fundo:      #0E1621;
  --superficie: #16212F;
  --elevado:    #1E2C3D;
  --linha:      #2C3D52;

  /* Texto */
  --texto:        #FFFFFF;
  --texto-suave:  #9FB2C7;
  /* Subido de #6B8099 para passar AA (4.5) mesmo sobre a superfície mais
     clara. Num ecrã de exterior os mínimos da norma são o piso, não a meta:
     a luz do sol reduz o contraste efetivo. */
  --texto-fraco:  #8DA2B8;

  /* Semântica */
  --ok:      #34D399;
  --aviso:   #FBBF24;
  --erro:    #F87171;
  --ok-bg:     rgba(52,211,153,0.14);
  --aviso-bg:  rgba(251,191,36,0.14);
  --erro-bg:   rgba(248,113,113,0.16);

  /* Tipografia — escala pensada para leitura a 1,5–2 m */
  --fonte: system-ui, "Segoe UI", Roboto, sans-serif;
  --t-nano:  20px;
  --t-micro: 26px;
  --t-peq:   32px;
  --t-base:  38px;
  --t-med:   48px;
  --t-gr:    62px;
  --t-xgr:   84px;

  /* Espaçamento — grelha de 8 px */
  --e1: 8px;  --e2: 16px; --e3: 24px;
  --e4: 32px; --e5: 48px; --e6: 64px;

  --raio: 16px;
  --alvo: 160px;          /* altura mínima de alvo tátil */
}

/* Tema de alto contraste (acessibilidade) */
body.contraste {
  --fundo: #000000;
  --superficie: #000000;
  --elevado: #111111;
  --linha: #FFFFFF;
  --texto: #FFFFFF;
  --texto-suave: #FFFFFF;
  --texto-fraco: #DDDDDD;
  --tub-azul: #4DA6FF;
  --ok: #4ADE80;
}

/* ------------------------------------------------------------
   Palco: o ecrã real é 2160×3840 (55" em retrato).
   Desenhamos a 1080×1920 e escalamos — metade da resolução,
   mesmas proporções. Em produção basta remover o transform.
   ------------------------------------------------------------ */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #000;
  font-family: var(--fonte);
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

#palco {
  position: absolute;
  top: 50%; left: 50%;
  width: 1080px; height: 1920px;
  transform-origin: center center;
  background: var(--fundo);
  color: var(--texto);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ---------- Cabeçalho ---------- */
.cabecalho {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--e4) var(--e5);
  border-bottom: 2px solid var(--linha);
  flex-shrink: 0;
}
.marca { display: flex; align-items: center; gap: var(--e3); }
.marca-logo {
  font-size: var(--t-med); font-weight: 800; letter-spacing: -2px;
  color: var(--tub-azul);
}
.marca-logo span { color: var(--tub-vermelho); }
.paragem { font-size: var(--t-peq); color: var(--texto-suave); }
.relogio { text-align: right; }
.relogio-hora { font-size: var(--t-med); font-weight: 600; font-variant-numeric: tabular-nums; }
.relogio-data { font-size: var(--t-nano); color: var(--texto-fraco); }

/* ---------- Corpo ---------- */
.corpo { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

.seccao-titulo {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--e4) var(--e5) var(--e2);
}
.seccao-titulo h2 { font-size: var(--t-base); font-weight: 600; }
.pulso {
  display: flex; align-items: center; gap: var(--e1);
  font-size: var(--t-micro); color: var(--ok);
}
.pulso::before {
  content: ""; width: 14px; height: 14px; border-radius: 50%;
  background: var(--ok); animation: bater 2s infinite;
}
@keyframes bater { 0%,100% { opacity: 1 } 50% { opacity: .25 } }
@media (prefers-reduced-motion: reduce) { .pulso::before { animation: none } }

/* Dados envelhecidos: o ponto pára de pulsar e passa a âmbar. A ausência
   de movimento é o sinal — nada está a chegar. */
.pulso.velho { color: var(--aviso); }
.pulso.velho::before { background: var(--aviso); animation: none; }

/* ---------- Lista de chegadas ---------- */
.chegadas { padding: 0 var(--e5); }
.chegada {
  display: flex; align-items: center; gap: var(--e4);
  padding: var(--e4) 0;
  border-bottom: 2px solid var(--linha);
}
.chegada:last-child { border-bottom: none; }
.linha-chip {
  min-width: 130px; text-align: center;
  background: var(--tub-azul); color: #fff;
  font-size: var(--t-med); font-weight: 700;
  padding: var(--e2) var(--e3); border-radius: 12px;
  font-variant-numeric: tabular-nums;
}
.chegada-info { flex: 1; min-width: 0; }
.chegada-destino {
  font-size: var(--t-base); font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chegada-nota {
  display: flex; align-items: center; gap: var(--e1);
  font-size: var(--t-micro); color: var(--texto-fraco); margin-top: 6px;
}
.chegada-nota.atraso { color: var(--aviso); }
.chegada-eta {
  font-size: var(--t-gr); font-weight: 700; text-align: right;
  min-width: 240px; font-variant-numeric: tabular-nums;
}
.chegada-eta.perto { color: var(--ok); }
.chegada-eta small { font-size: var(--t-peq); font-weight: 400; color: var(--texto-fraco); }
.chegada-eta.teorico { color: var(--texto-suave); }

/* ---------- Cartão do QR da app ---------- */
.qr-cartao {
  display: flex; align-items: center; gap: var(--e4);
  margin: var(--e3) var(--e5);
  padding: var(--e3) var(--e4);
  background: var(--superficie);
  border: 2px solid var(--linha);
  border-radius: var(--raio);
}
.qr-moldura {
  flex-shrink: 0;
  width: 190px; height: 190px;
  background: #FFFFFF;          /* fundo branco sempre: o QR tem de ler-se */
  border-radius: 12px;
  padding: 10px;
}
.qr-codigo { width: 100%; height: 100%; display: block; }
.qr-texto { flex: 1; min-width: 0; }
.qr-texto h3 {
  font-size: var(--t-base); font-weight: 600; margin-bottom: var(--e1);
}
.qr-texto p {
  font-size: var(--t-peq); color: var(--texto-suave); line-height: 1.4;
}
.qr-lojas {
  display: flex; gap: var(--e3); margin-top: var(--e2);
  font-size: var(--t-micro); color: var(--texto-fraco);
}

/* No ecrã institucional o cartão é maior e centrado */
.qr-cartao.destaque { flex-direction: column; text-align: center; margin: 0; }
.qr-cartao.destaque .qr-moldura { width: 380px; height: 380px; }

/* ---------- Navegação ---------- */
.navegacao {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--e2);
  padding: var(--e3) var(--e5);
  border-top: 2px solid var(--linha);
  flex-shrink: 0;
}
.nav-botao {
  min-height: var(--alvo);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--e2);
  background: var(--elevado); border: none; border-radius: var(--raio);
  color: var(--texto); font-family: inherit; font-size: var(--t-peq);
  cursor: pointer; transition: background .15s;
}
.nav-botao:active { background: var(--tub-azul); }
.nav-botao:focus-visible { outline: 4px solid var(--tub-azul); outline-offset: 4px; }
.nav-icone { font-size: 56px; line-height: 1; }
.nav-icone svg { width: 56px; height: 56px; display: block; }
.nav-botao.ativo { background: var(--tub-azul); }

/* ---------- Barra de acessibilidade ---------- */
.barra-acess {
  display: flex; gap: var(--e2);
  padding: 0 var(--e5) var(--e4);
  flex-shrink: 0;
}
.acess-botao {
  flex: 1; min-height: 96px;
  display: flex; align-items: center; justify-content: center; gap: var(--e2);
  background: transparent; border: 2px solid var(--linha); border-radius: var(--raio);
  color: var(--texto-suave); font-family: inherit; font-size: var(--t-micro);
  cursor: pointer;
}
.acess-botao[aria-pressed="true"] { border-color: var(--tub-azul); color: var(--texto); }

/* ---------- Ecrãs secundários ---------- */
/* Alvo de 150 px ≈ 94 mm no ecrã real, acima do mínimo definido para
   alvos táteis. É o botão mais usado de todos. */
.voltar {
  display: flex; align-items: center; gap: var(--e2);
  margin: var(--e3) var(--e5) 0;
  min-height: 150px; padding: 0 var(--e4);
  background: var(--elevado); border: none; border-radius: var(--raio);
  color: var(--texto); font-family: inherit; font-size: var(--t-peq);
  cursor: pointer;
}
.conteudo { padding: var(--e3) var(--e5); overflow: hidden; }
.cartao {
  background: var(--superficie); border-radius: var(--raio);
  padding: var(--e4); margin-bottom: var(--e3);
}
.cartao h3 { font-size: var(--t-base); font-weight: 600; margin-bottom: var(--e2); }
.cartao p  { font-size: var(--t-peq); color: var(--texto-suave); line-height: 1.5; }
.tabela { width: 100%; border-collapse: collapse; font-size: var(--t-peq); }
.tabela td { padding: var(--e3) 0; border-bottom: 2px solid var(--linha); }
.tabela td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.tabela tr:last-child td { border-bottom: none; }
.horas {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--e2);
  font-size: var(--t-peq); font-variant-numeric: tabular-nums;
}
.horas span {
  background: var(--elevado); border-radius: 10px;
  padding: var(--e2) 0; text-align: center;
}
.horas span.passou { color: var(--texto-fraco); background: transparent; }

/* ---------- Publicidade (estado inativo) ---------- */
.publicidade { flex: 1; display: flex; flex-direction: column; }
.criativo {
  position: relative;
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--e3);
  padding: var(--e5) var(--e5) 200px;   /* espaço reservado à pastilha de toque */
  text-align: center;
}
/* Marcador de conteúdo comercial. Discreto, mas presente: distinguir
   publicidade de informação institucional é boa prática e, em suporte
   municipal, é matéria que costuma estar regulamentada. */
.criativo-marcador {
  position: absolute; top: var(--e4); right: var(--e4);
  font-size: var(--t-nano); letter-spacing: 2px; text-transform: uppercase;
  opacity: .6;
}
.criativo-icone {
  height: 240px;
  display: flex; align-items: center; justify-content: center;
}
.criativo-icone svg { height: 100%; width: auto; }
.criativo-marca {
  font-size: var(--t-med); font-weight: 400;
  letter-spacing: 6px; text-transform: uppercase;
  opacity: .85;
}
.criativo-titulo { font-size: var(--t-xgr); font-weight: 700; color: #fff; line-height: 1.1; }
.criativo-legenda { font-size: var(--t-base); max-width: 800px; line-height: 1.35; }
.faixa-persistente {
  background: var(--superficie);
  border-top: 4px solid var(--tub-azul);
  padding: var(--e3) var(--e5);
  flex-shrink: 0;
}
.faixa-linha {
  display: flex; align-items: center; gap: var(--e3);
  padding: var(--e2) 0; font-size: var(--t-base);
}
.faixa-linha .linha-chip { min-width: 100px; font-size: var(--t-peq); padding: 8px var(--e2); }
.faixa-linha .destino { flex: 1; }
.faixa-linha .eta { font-weight: 700; font-variant-numeric: tabular-nums; }
.toque {
  position: absolute;
  bottom: 60px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; justify-content: center; gap: var(--e3);
  padding: var(--e3) var(--e4);
  white-space: nowrap;
  background: #FFFFFF;
  color: var(--tub-azul);
  border-radius: 999px;
  font-size: var(--t-base); font-weight: 700;
}
.toque-dedo {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  width: 68px; height: 68px;
}
.toque-dedo svg { width: 60px; height: 60px; }
/* Ondas concêntricas a partir do dedo. Brancas, para se lerem sobre o
   criativo seja qual for a sua cor. Substituem o brilho difuso: a
   affordance vem do movimento e do contraste, não de efeitos. */
.toque-onda {
  position: absolute; inset: -8px;
  border: 4px solid rgba(255,255,255,.9);
  border-radius: 50%;
  opacity: 0;
  animation: ondular 2.6s ease-out infinite;
}
.toque-onda:nth-child(2) { animation-delay: .8s; }

@keyframes ondular {
  0%   { transform: scale(.5);  opacity: .95 }
  55%  { transform: scale(2.8); opacity: 0 }
  100% { transform: scale(2.8); opacity: 0 }
}

/* Sem movimento para quem o desativou no sistema. A pastilha branca
   sozinha já se lê como alvo — perde-se o chamamento, não a mensagem. */
@media (prefers-reduced-motion: reduce) {
  .toque-onda { animation: none; opacity: .4; transform: scale(1.8) }
}

/* ---------- Ecrãs de sistema ---------- */
.sistema {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: var(--e3);
  text-align: center; padding: var(--e6);
}
.sistema-icone { font-size: 180px; }
.sistema h2 { font-size: var(--t-gr); font-weight: 700; }
.sistema p { font-size: var(--t-base); color: var(--texto-suave); line-height: 1.5; }

/* ---------- Faixa de aviso ---------- */
.faixa-aviso {
  display: flex; gap: var(--e3); align-items: center;
  margin: var(--e3) var(--e5);
  padding: var(--e3) var(--e4);
  background: var(--aviso-bg);
  border-left: 8px solid var(--aviso);
  font-size: var(--t-peq); color: var(--aviso);
}
.faixa-aviso-texto { flex: 1; min-width: 0; line-height: 1.25; }

/* Aviso prioritário já dispensado: mesma posição, vermelho e a negrito.
   A cor distingue "há um desvio" de "a linha está suspensa". */
.faixa-aviso.critico {
  background: var(--erro-bg);
  border-left-color: var(--erro);
  color: var(--erro);
}
.faixa-aviso.critico strong { font-weight: 700; }
.faixa-aviso.critico .faixa-aviso-texto { font-size: var(--t-peq); }

/* ---------- Aviso prioritário (sobreposto) ----------
   O escurecimento é parcial de propósito: deixa entrever a interface por
   baixo, para se perceber que está lá e continua a funcionar. */
.sobreposicao {
  position: absolute; inset: 0; z-index: 50;
  background: rgba(6,10,16,.74);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: var(--e4);
  padding: var(--e5);
}
.aviso-painel {
  width: 100%;
  background: var(--superficie);
  border: 4px solid var(--aviso);
  border-radius: var(--raio);
  padding: var(--e6) var(--e5);
  display: flex; flex-direction: column; align-items: center; gap: var(--e3);
  text-align: center;
}
.aviso-painel .icone svg { width: 130px; height: 130px; color: var(--aviso); }
.aviso-painel h2 { font-size: var(--t-gr); font-weight: 800; color: var(--aviso); }
.aviso-painel p  { font-size: var(--t-med); line-height: 1.4; }

/* Convite a dispensar o aviso. Repete a linguagem da pastilha do estado
   inativo — branco sólido, ondas — para o gesto ser o mesmo em todo o lado. */
.aviso-continuar {
  position: relative;
  display: flex; align-items: center; justify-content: center; gap: var(--e3);
  padding: var(--e3) var(--e4);
  background: #FFFFFF;
  color: var(--tub-azul);
  border-radius: 999px;
  font-size: var(--t-base); font-weight: 700;
  white-space: nowrap;
}
.aviso-continuar .toque-dedo { width: 60px; height: 60px; }
.aviso-continuar .toque-dedo svg { width: 52px; height: 52px; }

/* ---------- Aviso de estado (degradado / offline) ----------
   Explica ao passageiro o que está diferente e o que pode fazer.
   Fica no topo do corpo, antes da informação que qualifica. */
.aviso-estado {
  display: flex; gap: var(--e4); align-items: flex-start;
  margin: var(--e3) var(--e5);
  padding: var(--e4);
  background: var(--aviso-bg);
  border-left: 8px solid var(--aviso);
}
.aviso-estado-icone { flex-shrink: 0; }
.aviso-estado-icone svg { width: 64px; height: 64px; color: var(--aviso); }
.aviso-estado h3 {
  font-size: var(--t-base); font-weight: 600; color: var(--aviso);
  margin-bottom: 6px;
}
.aviso-estado p { font-size: var(--t-peq); color: var(--texto-suave); line-height: 1.4; }

/* ---------- Alternativas (ecrã de manutenção) ----------
   Um equipamento fora de serviço tem de dizer para onde ir a seguir.
   Três caminhos, com o QR primeiro por ser o único acionável ali mesmo. */
.alternativas {
  display: flex; gap: var(--e3); align-items: stretch;
  width: 100%; margin-top: var(--e5);
}
.alternativa {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--e2);
  background: var(--superficie);
  border-radius: var(--raio);
  padding: var(--e4) var(--e3);
}
.alternativa .qr-moldura { width: 200px; height: 200px; }
.alternativa strong { font-size: var(--t-med); font-weight: 700; }
.alternativa span {
  font-size: var(--t-micro); color: var(--texto-suave); text-align: center;
}

/* ---------- Mapa ---------- */
.mapa-filtros {
  display: flex; gap: var(--e2);
  padding: var(--e3) var(--e5) 0;
}
.filtro {
  flex: 1; min-height: 96px;
  display: flex; align-items: center; justify-content: center; gap: var(--e2);
  background: transparent; border: 2px solid var(--linha); border-radius: var(--raio);
  color: var(--texto-fraco); font-family: inherit; font-size: var(--t-micro);
  cursor: pointer;
}
.filtro.ligado { border-color: var(--tub-azul); color: var(--texto); background: var(--elevado); }
.filtro-ponto { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }

.mapa-caixa {
  margin: var(--e3) var(--e5);
  background: var(--superficie);
  border-radius: var(--raio);
  overflow: hidden;
}
.mapa-svg { width: 100%; height: auto; display: block; }

.rua  { stroke: #24344A; stroke-width: 26; fill: none; stroke-linecap: round; }
.rota { fill: none; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; opacity: .9; }

.halo {
  fill: rgba(227,6,19,.22);
  animation: pulsar 2.6s ease-out infinite;
}
@keyframes pulsar {
  0%   { transform: scale(.7); opacity: .8 }
  70%  { transform: scale(1.5); opacity: 0 }
  100% { transform: scale(1.5); opacity: 0 }
}
.halo { transform-box: fill-box; transform-origin: center; }
@media (prefers-reduced-motion: reduce) { .halo { animation: none; opacity: .5 } }

.paragem-nome {
  fill: #FFFFFF; font-size: 26px; font-weight: 600;
  text-anchor: middle; font-family: var(--fonte);
  paint-order: stroke; stroke: #16212F; stroke-width: 7px; stroke-linejoin: round;
}
.paragem-nome.atual { font-size: 34px; font-weight: 700; }
.paragem-linhas {
  fill: #9FB2C7; font-size: 21px; text-anchor: middle; font-family: var(--fonte);
  paint-order: stroke; stroke: #16212F; stroke-width: 6px; stroke-linejoin: round;
}
.ponto-nome {
  fill: #9FB2C7; font-size: 21px; text-anchor: middle; font-family: var(--fonte);
  paint-order: stroke; stroke: #16212F; stroke-width: 6px; stroke-linejoin: round;
}
.veiculo-linha {
  fill: #0E1621; font-size: 30px; font-weight: 700;
  text-anchor: middle; font-family: var(--fonte);
}
/* A transição suaviza o salto entre atualizações de posição, tal como
   aconteceria com dados reais a chegar de poucos em poucos segundos. */
.veiculo { transition: transform .45s linear; }
@media (prefers-reduced-motion: reduce) { .veiculo { transition: none } }

.mapa-legenda {
  display: flex; justify-content: center; gap: var(--e5);

}

  display: grid; grid-template-columns: 1.05fr 1fr; gap: var(--e3);

}

  font-size: var(--t-micro); text-transform: uppercase; letter-spacing: 2px;

}

/* Termómetro: a linha vertical é o traço da carreira; cada ponto uma paragem. */
.termometro { list-style: none; position: relative; padding-left: 44px; }
.termometro::before {
  content: ""; position: absolute; left: 17px; top: 18px; bottom: 18px;
  width: 8px; border-radius: 4px; background: var(--cor-linha);
}
.parada { position: relative; padding: var(--e2) 0; min-height: 76px; }
.parada-ponto {
  position: absolute; left: -34px; top: 24px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--fundo); border: 5px solid var(--cor-linha);
}
.parada.terminal .parada-ponto { width: 30px; height: 30px; left: -38px; top: 20px; background: var(--cor-linha); }

  width: 34px; height: 34px; left: -40px; top: 18px;
  background: var(--tub-vermelho); border-color: #fff;
}
.parada-nome { font-size: var(--t-peq); line-height: 1.2; }
.parada.terminal .parada-nome { font-weight: 700; }
.parada.aqui .parada-nome { font-weight: 700; color: #fff; }
.parada-aqui {
  display: block; font-size: var(--t-nano); color: var(--tub-vermelho);
  text-transform: uppercase; letter-spacing: 2px; margin-top: 2px;

/* Quadro horário no formato dos desdobráveis: hora à esquerda, minutos à direita. */
/* Quadro horário no formato dos desdobráveis: hora à esquerda, minutos à
   direita. A densidade é calculada para o pior caso — uma linha com serviço
   das 6h às 23h dá 18 filas, que têm de caber sem corte nem deslocamento. */
.quadro { width: 100%; border-collapse: collapse; }
.quadro th {
  width: 76px; text-align: left; vertical-align: top;
  padding: 9px var(--e2) 9px 0;
  font-size: var(--t-micro); font-weight: 700; color: var(--tub-azul);
  font-variant-numeric: tabular-nums;
  border-bottom: 2px solid var(--linha);
}
.quadro td {
  padding: 9px 0;

  font-variant-numeric: tabular-nums;
  border-bottom: 2px solid var(--linha);
}
/* A hora corrente ganha fundo e barra lateral; as horas passadas esbatem.

.quadro tr.agora th, .quadro tr.agora td { background: rgba(0,114,188,.20); }
.quadro tr.agora th {
  color: #fff; box-shadow: inset 5px 0 0 var(--tub-azul); padding-left: var(--e2);
}
.quadro tr.passada th { color: var(--texto-fraco); }
.quadro tr.passada td { color: var(--texto-fraco); }

.sem-servico { font-size: var(--t-peq); color: var(--texto-fraco); padding: var(--e4) 0; }

/* ------------------------------------------------------------------
   LINHAS — percursos e horários
   Os horários são gerados a partir de uma frequência, para manter os

   ------------------------------------------------------------------ */

/* Expande um intervalo regular numa tabela { hora: [minutos] }. */
function gerarHorario(hIni, mIni, hFim, mFim, intervalo) {
  const tabela = {};
  let t = hIni * 60 + mIni;
  const fim = hFim * 60 + mFim;
  while (t <= fim) {
    const h = String(Math.floor(t / 60)).padStart(2, "0");
    (tabela[h] ||= []).push(String(t % 60).padStart(2, "0"));
    t += intervalo;
  }
  return tabela;
}

   [3] ESTADO
   Máquina de estados com os seis estados do descritivo.
   Um único objeto guarda tudo o que o interface precisa.
   ============================================================ */

const ESTADOS = {
  INATIVO:    "inativo",      // publicidade
  ATIVO:      "ativo",        // passageiro a interagir
  PRIORIDADE: "prioridade",   // aviso sobreposto, ocupa o ecrã
  LEVANTADA:  "levantada",    // aviso lido: interface normal + faixa vermelha
  DEGRADADO:  "degradado",    // sem tempo real
  OFFLINE:    "offline",      // sem conectividade
  MANUTENCAO: "manutencao"
};

const app = {
  estado: ESTADOS.INATIVO,
  ecra: "inicio",          // inicio | horarios | tarifario | mapa | info
  linhaAberta: "2",
  idioma: "pt",
  contraste: false,
  alturaReduzida: false,
  campanha: 0,
  ultimaSinc: new Date(),
  filtros: { farmacia: true, multibanco: false, taxi: false },
  pontoAberto: null,
  mapaModo: "paragem",     // paragem | rede
  linhaMapa: null,         // carreira selecionada no modo rede
  filtroLinha: "",         // dígitos escritos no teclado da rede
  linhaDetalhe: null,      // null = lista de linhas; "42" = detalhe dessa linha
  diaTipo: "uteis",
  sentido: 0,
  pesquisa: "",
  teclado: false,

  /* O aviso em vigor vem do centro de controlo. Se já foi lido pelo
     passageiro que está aqui agora, isso lê-se no estado LEVANTADA —
     não precisa de variável própria. */
  avisoAtivo: false,
  dispensadoEm: 0,
  ultimoToque: 0
};

// Temporizadores de inatividade — dois passos, como discutido
/* Tempos de inatividade. Alargados face ao habitual (30–45 s) por causa do
   público desta paragem: hospital, com muitos utentes idosos ou com
   mobilidade reduzida, que leem e navegam mais devagar. Confirmar por
   observação no local antes de fixar. */
const TEMPO_VOLTA_INICIO = 90000;  // 90 s sem toque → volta ao ecrã inicial
const TEMPO_PUBLICIDADE  = 45000;  // +45 s → volta à publicidade
let tVoltaInicio, tPublicidade;

/* Reaparecimento do aviso dispensado.
   O aviso volta a ecrã cheio quando chega um passageiro novo — ou seja,
   quando o equipamento acorda da publicidade. Enquanto a mesma pessoa está
   a usá-lo, fica no vermelho da zona de avisos e não volta a interromper:
   já foi lido.

   TEMPO_REAPARECER volta a ativar a insistência por tempo. Deixado a 0
   porque, na prática, o regresso à publicidade já chega para renovar. */
const TEMPO_REAPARECER = 0;        // 0 = desligado; ex.: 45000 para 45 s
const MARGEM_INTERACAO = 12000;    // nunca interromper a menos de 12 s de um toque
const MARGEM_MESMA_PESSOA = 25000; // acordar tão depressa é a mesma pessoa
let tReaparecer;

function agendarReaparecimento() {
  clearTimeout(tReaparecer);
  if (!TEMPO_REAPARECER) return;
  tReaparecer = setTimeout(() => {
    if (app.estado !== ESTADOS.LEVANTADA) return;
    if (Date.now() - app.ultimoToque < MARGEM_INTERACAO) {
      agendarReaparecimento();     // alguém está a mexer: adia
      return;
    }
    irPara(ESTADOS.PRIORIDADE);
  }, TEMPO_REAPARECER);
}

function reiniciarInatividade() {
  clearTimeout(tVoltaInicio);
  clearTimeout(tPublicidade);
  tVoltaInicio = setTimeout(() => {
    app.ecra = "inicio";
    desenhar();
    tPublicidade = setTimeout(() => irPara(ESTADOS.INATIVO), TEMPO_PUBLICIDADE);
  }, TEMPO_VOLTA_INICIO);
}

function irPara(novoEstado) {
  app.estado = novoEstado;

  // Entrar em qualquer um dos dois estados de aviso implica que há aviso
  // em vigor — permite forçá-los pelo painel de desenvolvimento.
  if (novoEstado === ESTADOS.PRIORIDADE || novoEstado === ESTADOS.LEVANTADA) {
    app.avisoAtivo = true;
  }

  if (novoEstado === ESTADOS.INATIVO) {
    clearTimeout(tVoltaInicio);
    clearTimeout(tPublicidade);
    clearTimeout(tReaparecer);
    app.ecra = "inicio";
  } else {
    reiniciarInatividade();
  }
  desenhar();
}

// Qualquer toque acorda o equipamento e interrompe a publicidade.
// Sobre um aviso prioritário, o toque levanta-o: a interface volta ao
// normal e o aviso passa a faixa vermelha. Informa, não bloqueia.
function aoTocar() {
  app.ultimoToque = Date.now();

  if (app.estado === ESTADOS.INATIVO) {
    if (!app.avisoAtivo) { irPara(ESTADOS.ATIVO); return; }
    // Acordar poucos segundos depois de levantar o aviso é a mesma
    // pessoa a voltar — não se lhe repete o ecrã cheio.
    const mesmaPessoa = Date.now() - app.dispensadoEm < MARGEM_MESMA_PESSOA;
    irPara(mesmaPessoa ? ESTADOS.LEVANTADA : ESTADOS.PRIORIDADE);

  } else if (app.estado === ESTADOS.PRIORIDADE) {
    app.dispensadoEm = Date.now();
    agendarReaparecimento();
    irPara(ESTADOS.LEVANTADA);

  } else if (app.estado !== ESTADOS.MANUTENCAO) {
    reiniciarInatividade();
  }
}

function chegada(c, teorico) {
  const perto = c.eta <= 5 && !teorico;
  const nota = teorico
    ? t("horário planeado", "scheduled")
    : c.atraso > 0
      ? t(`atraso de ${c.atraso} min`, `${c.atraso} min delay`)
      : c.tempoReal ? "" : t("horário planeado", "scheduled");
  return `
    <div class="chegada">
      <div class="linha-chip">${c.linha}</div>
      <div class="chegada-info">
        <div class="chegada-destino">${t(c.destino, c.destinoEN)}</div>

        </div>
      </div>
      <div class="chegada-eta ${perto ? "perto" : ""} ${teorico ? "teorico" : ""}">
        ${teorico ? horaDaqui(c.eta) : `${c.eta}<small> min</small>`}
      </div>
    </div>`;
}

function horaDaqui(minutos) {
  const d = new Date(Date.now() + minutos * 60000);
  return d.toLocaleTimeString("pt-PT", { hour: "2-digit", minute: "2-digit" });
}

   funciona sem rede, que é requisito num equipamento de rua. */
/* Frescura dos dados. Não é um relógio a contar: mostra a hora da última
   sincronização e muda de cor quando a informação envelhece. Enquanto tudo
   corre bem passa despercebido; quando falha, dá-se a ver. */

  const segundos = Math.round((Date.now() - app.ultimaSinc) / 1000);
  const hora = app.ultimaSinc.toLocaleTimeString("pt-PT",

  return {
    classe: segundos > 120 ? "velho" : "",
    texto:  t(`Última atualização: ${hora}`, `Last updated: ${hora}`)
  };
}

/* --- Horários e percursos: seleção de linha --- */
function ecraHorarios() {
  return app.linhaDetalhe ? detalheLinha() : listaLinhas();
}

/* Filtra por número de linha, terminal ou nome de paragem, e diz porquê. */
function procurarLinhas(termo) {
  const q = termo.trim().toLowerCase();
  return Object.entries(LINHAS).map(([num, l]) => {
    if (!q) return { num, l, motivo: null };
    if (num.startsWith(q)) return { num, l, motivo: null };
    const term = l.terminais.find(x => x.toLowerCase().includes(q));
    if (term) return { num, l, motivo: term };
    const par = l.paragens.find(x => x.toLowerCase().includes(q));
    if (par) return { num, l, motivo: par };
    return null;
  }).filter(Boolean);
}

/* Disposição das letras. A evidência é contraditória: em estudos com
   utilizadores sem experiência de teclado, a ordem alfabética ganha; com
   qualquer exposição a telemóveis, ganha o QWERTY. Em 2026 a segunda
   situação é a comum, mesmo entre público idoso, por isso é o predefinido.
   Fica isolado numa constante para se poder testar no local com pessoas
   reais — é o único modo de resolver a questão para esta paragem. */
const LAYOUT_TECLADO = "qwerty";      // "qwerty" ou "alfabetico"

/* Teclado do quiosque. Dígitos primeiro, porque a maioria das pesquisas é
   pelo número da carreira; letras a seguir.

   Cinco teclas por fila, e não dez: com dez, cada tecla ficaria com cerca
   de 60 mm de largura no ecrã real, abaixo do mínimo definido para alvos
   táteis. Duas filas custam uma linha e mantêm o alvo utilizável. */
function teclado() {
  const digitos = ["12345", "67890"];
  const letras  = LAYOUT_TECLADO === "qwerty"
    ? ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"]
    : ["ABCDEFG", "HIJKLMN", "OPQRSTU", "VWXYZ"];
  const fila = (chars, classe = "") => `<div class="teclado-fila">
      ${[...chars].map(c => `<button class="tecla ${classe}" data-tecla="${c}">${c}</button>`).join("")}
    </div>`;

  return `
    <div class="teclado">
      ${digitos.map(f => fila(f, "digito")).join("")}
      ${letras.map(f => fila(f)).join("")}
      <div class="teclado-fila">
        <button class="tecla larga" data-tecla=" ">${t("espaço", "space")}</button>
        <button class="tecla larga" data-tecla="apagar">${t("apagar", "delete")}</button>
        <button class="tecla larga" data-acao="fechar-teclado">${t("fechar", "close")}</button>
      </div>
    </div>`;
}

function listaLinhas() {

/* --- Detalhe: termómetro do percurso e tabelas de horários --- */
function detalheLinha() {
  const num = app.linhaDetalhe;
  const l = LINHAS[num];
  const paragens = app.sentido === 0 ? l.paragens : [...l.paragens].reverse();
  const tabela = l.horarios[app.diaTipo] || {};
  const horas = Object.keys(tabela).sort();

  /* Destaque da hora corrente. Só faz sentido no quadro do dia de hoje:
     olhar para sábado a meio de uma quarta-feira não tem "agora". */
  const agora = new Date();
  const hoje = app.diaTipo === tipoDiaHoje();
  const horaAtual   = hoje ? agora.getHours()   : -1;
  const minutoAtual = hoje ? agora.getMinutes() : -1;

  return `
    <button class="voltar" data-acao="voltar-lista">
      <span class="voltar-icone">${ICONES.seta}</span> ${t("Todas as linhas", "All routes")}</button>

    <div class="linha-cabecalho">
      <span class="cartao-linha-num grande" style="background:${l.cor}">${num}</span>
      <span class="linha-sentido">
        <span class="linha-de">${paragens[0]}</span>
        <span class="linha-para">${paragens[paragens.length - 1]}</span>
      </span>
      <button class="inverter" data-acao="inverter-sentido"
              aria-label="${t("Inverter sentido", "Reverse direction")}">
        ${ICONES.inverter}
      </button>
    </div>

    <div class="abas">
      ${TIPOS_DIA.map(d => `
        <button class="aba ${app.diaTipo === d.id ? "ativa" : ""}" data-dia="${d.id}">
          ${t(d.pt, d.en)}
        </button>`).join("")}
    </div>

    <div class="duas-colunas">
      <div class="coluna-percurso">
        <h3 class="coluna-titulo">${t("Percurso", "Route")}</h3>
        <ol class="termometro" style="--cor-linha:${l.cor}">
          ${paragens.map((par, i) => {
            const aqui = par === PARAGEM.nome;
            const terminal = i === 0 || i === paragens.length - 1;
            return `
              <li class="parada ${aqui ? "aqui" : ""} ${terminal ? "terminal" : ""}">
                <span class="parada-ponto"></span>
                <span class="parada-nome">${par}</span>
                ${aqui ? `<span class="parada-aqui">${t("está aqui", "you are here")}</span>` : ""}
              </li>`;
          }).join("")}
        </ol>
      </div>

      <div class="coluna-horario">
        <h3 class="coluna-titulo">${t("Partidas", "Departures")}</h3>
        ${horas.length === 0
          ? `<p class="sem-servico">${t("Sem serviço neste dia.", "No service on this day.")}</p>`
          : `<table class="quadro">
              ${horas.map(h => {
                const hora = Number(h);
                const estado = hora < horaAtual ? "passada"
                             : hora === horaAtual ? "agora" : "";
                // Dentro da hora corrente, separa as partidas já perdidas
                const minutos = tabela[h].map(m =>
                  (hora < horaAtual || (hora === horaAtual && Number(m) < minutoAtual))
                    ? `<span class="ido">${m}</span>` : `<span>${m}</span>`).join(" ");
                return `
                  <tr class="${estado}">
                    <th>${h}</th>
                    <td>${minutos}</td>
                  </tr>`;
              }).join("")}
            </table>`}
      </div>
    </div>`;
}

/* --- Mapa --- */
/* ------------------------------------------------------------------
   QUALIDADE DOS DADOS
   Degradado e offline não são ecrãs: são condições que atravessam todos
   os ecrãs. Tudo o que depende de tempo real consulta esta função antes
   de apresentar um número ao passageiro.
   ------------------------------------------------------------------ */
const temTempoReal = () =>
  app.estado !== ESTADOS.DEGRADADO && app.estado !== ESTADOS.OFFLINE;

/* Tipo de dia de hoje, para escolher o quadro horário certo. */
function tipoDiaHoje() {
  const d = new Date().getDay();          // 0 domingo … 6 sábado
  return d === 0 ? "domingo" : d === 6 ? "sabado" : "uteis";
}

/* Próxima partida planeada de uma linha, quando não há tempo real.
   Devolve "HH:MM" ou null se já não houver serviço hoje. */
function proximaPartidaPlaneada(linha) {
  const tabela = (LINHAS[linha] || {}).horarios;
  if (!tabela) return null;
  const hoje = tabela[tipoDiaHoje()] || {};
  const agora = new Date();
  const minutosAgora = agora.getHours() * 60 + agora.getMinutes();
  let melhor = null;
  for (const [h, minutos] of Object.entries(hoje)) {
    for (const m of minutos) {
      const v = Number(h) * 60 + Number(m);
      if (v >= minutosAgora && (melhor === null || v < melhor)) melhor = v;
    }
  }
  if (melhor === null) return null;
  return String(Math.floor(melhor / 60)).padStart(2, "0") + ":" +
         String(melhor % 60).padStart(2, "0");
}

/* Faixa que explica o estado dos dados. Aparece em todos os ecrãs, não
   só no inicial — quem entra no tarifário tem o mesmo direito a saber. */
function avisoEstado() {
  if (app.estado === ESTADOS.DEGRADADO) {
    return `
      <div class="aviso-estado">
        <span class="aviso-estado-icone">${ICONES.antena}</span>
        <div>
          <h3>${t("Horários previstos", "Scheduled times")}</h3>
          <p>${t(
            "Sem ligação aos autocarros neste momento. Os tempos indicados são os planeados — o autocarro pode chegar antes ou depois.",
            "No live connection to the vehicles. Times shown are scheduled and may vary.")}</p>
        </div>
      </div>`;
  }
  if (app.estado === ESTADOS.OFFLINE) {
    const sinc = app.ultimaSinc.toLocaleTimeString("pt-PT",
                   { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    return `
      <div class="aviso-estado">
        <span class="aviso-estado-icone">${ICONES.antena}</span>
        <div>
          <h3>${t(`Última atualização foi às ${sinc}`, `Last updated at ${sinc}`)}</h3>
          <p>${t(
            "Este equipamento está sem ligação. Horários, tarifários e percursos continuam corretos; os tempos de espera não.",
            "This unit is offline. Timetables, fares and routes remain correct; waiting times do not.")}</p>
        </div>
      </div>`;
  }
  return "";
}

/* --- Como chegar a um ponto de interesse ---
   Decide entre percurso a pé e viagem de autocarro em função da distância.
   Sugerir autocarro para 300 m é mau conselho; omiti-lo para 1 km também.
   Com cartografia real, o cálculo passaria a um serviço de routing. */
function comoChegar(p) {
  const paragem = MAPA.paragens.find(x => x.atual);
  const dx = (p.x - paragem.x) * ESCALA_MAPA;
  const dy = (p.y - paragem.y) * ESCALA_MAPA;
  const metros = Math.round(Math.hypot(dx, dy) * SINUOSIDADE);
  const minutos = Math.max(1, Math.round(metros / VELOCIDADE_PE / 60));

  // Sem autocarro que sirva, ou perto o suficiente: vai-se a pé.
  if (!p.viagem || minutos <= LIMITE_A_PE) {
    return { modo: "pe", metros, minutos };
  }

  const minutosFinais = Math.max(1, Math.round(p.viagem.aPe / VELOCIDADE_PE / 60));

  // Com tempo real, diz-se dentro de quantos minutos parte. Sem ele, dá-se
  // a hora planeada — nunca um número de minutos que não se pode garantir.
  const proxima = temTempoReal()
    ? CHEGADAS.find(c => c.linha === p.viagem.linha)
    : null;

  return {
    modo: "autocarro",
    metros, minutos,
    linha: p.viagem.linha,
    paragemSaida: p.viagem.paragem,
    esperaMin: proxima ? proxima.eta : null,
    horaPlaneada: temTempoReal() ? null : proximaPartidaPlaneada(p.viagem.linha),
    aPeFinalMin: minutosFinais,
    aPeFinalM: p.viagem.aPe
  };
}

function painelPonto() {
  if (app.pontoAberto === null) return "";
  const p = MAPA.pontos[app.pontoAberto];
  if (!p) return "";
  const r = comoChegar(p);
  const cor = TIPOS_PONTO[p.tipo].cor;

  const corpo = r.modo === "pe"
    ? `
      <div class="passo">
        <span class="passo-icone" style="color:${cor}">${ICONES.passos}</span>
        <div>

          <div class="passo-nota">${r.metros} ${t("metros a partir desta paragem",
                                                  "metres from this stop")}</div>
        </div>
      </div>
      <p class="painel-nota">${t(
        "A esta distância não compensa esperar pelo autocarro.",
        "At this distance it is not worth waiting for the bus.")}</p>`
    : `
      <div class="passo">
        <span class="passo-numero">1</span>
        <div>
          <div class="passo-titulo">
            ${t("Apanhe a linha", "Take route")}
            <span class="linha-chip pequeno">${r.linha}</span>
          </div>
          <div class="passo-nota">${
            r.esperaMin !== null
              ? t(`Parte desta paragem dentro de ${r.esperaMin} min`,
                  `Departs from this stop in ${r.esperaMin} min`)
              : r.horaPlaneada
                ? t(`Partida planeada às ${r.horaPlaneada}`,
                    `Scheduled departure at ${r.horaPlaneada}`)
                : t("Sem mais partidas hoje", "No more departures today")}</div>
        </div>
      </div>
      <div class="passo">
        <span class="passo-numero">2</span>
        <div>
          <div class="passo-titulo">${t("Saia em", "Get off at")} ${r.paragemSaida}</div>
        </div>
      </div>
      <div class="passo">
        <span class="passo-numero">3</span>
        <div>
          <div class="passo-titulo">${t("A pé", "On foot")} · ${r.aPeFinalMin} min</div>
          <div class="passo-nota">${r.aPeFinalM} ${t("metros até ao destino",
                                                     "metres to the destination")}</div>
        </div>
      </div>
      <p class="painel-nota">${t(
        `A pé desde aqui seriam cerca de ${r.minutos} min.`,
        `Walking all the way would take about ${r.minutos} min.`)}</p>`;

  return `
    <div class="ponto-painel">
      <div class="ponto-painel-topo">
        <span class="ponto-painel-marca" style="background:${cor}"></span>
        <div class="ponto-painel-nome">${p.nome}</div>
        <button class="ponto-fechar" data-acao="fechar-ponto"
                aria-label="${t("Fechar", "Close")}">×</button>
      </div>
      <div class="ponto-painel-corpo">${corpo}</div>
    </div>`;
}

function ecraMapa() {
  return app.mapaModo === "rede" ? mapaRede() : mapaParagem();
}

/* --- Modo local: o que interessa a quem está nesta paragem --- */
function mapaParagem() {
  const filtros = Object.entries(TIPOS_PONTO).map(([tipo, cfg]) => `
    <button class="filtro ${app.filtros[tipo] ? "ligado" : ""}" data-filtro="${tipo}">
      <span class="filtro-ponto" style="background:${cfg.cor}"></span>
      ${t(cfg.rotulo, cfg.rotuloEN)}
    </button>`).join("");

  const rotas = Object.entries(MAPA.rotas).filter(([, r]) => r.serveParagem);
  const veiculos = VEICULOS.filter(v => MAPA.rotas[v.linha].serveParagem);

  return `
    ${cabecalhoMapa()}
    <div class="mapa-filtros">${filtros}</div>
    <div class="mapa-caixa">
      <svg id="mapa-svg" viewBox="0 0 1000 880" class="mapa-svg">
        ${desenharRuas()}
        ${rotas.map(([num, r]) =>
          `<path id="rota-${num}" d="${r.d}" class="rota" stroke="${LINHAS[num].cor}"/>`).join("")}
        ${desenharPontos()}
        ${desenharParagens()}
        ${desenharVeiculos(veiculos)}
      </svg>
      ${painelPonto()}
    </div>
    ${legendaMapa()}`;
}

/* --- Modo rede: qualquer carreira, passe ou não por aqui --- */
function mapaRede() {
  const num = app.linhaMapa;
  const l = num ? LINHAS[num] : null;
  const veiculos = num ? VEICULOS.filter(v => v.linha === num) : [];

  /* Com dezenas de carreiras, mostrar todas de uma vez deixa de funcionar.
     O teclado numérico filtra à medida que se escreve: «8» reduz a lista
     a 8, 87 e 88. Só dígitos — ninguém procura uma carreira por letras. */
  const filtradas = Object.keys(LINHAS)
    .filter(n => !app.filtroLinha || n.startsWith(app.filtroLinha))
    .sort((a, b) => Number(a) - Number(b));

  const numpad = `
    <div class="numpad">
      <div class="numpad-mostrador ${app.filtroLinha ? "" : "vazio"}">
        ${app.filtroLinha || t("carreira", "route")}
      </div>
      ${["12345", "67890"].map(f => `<div class="numpad-fila">
        ${[...f].map(d => `<button class="tecla-num" data-digito="${d}">${d}</button>`).join("")}
      </div>`).join("")}
      <div class="numpad-fila">
        <button class="tecla-num acao" data-digito="apagar">${t("apagar", "delete")}</button>
        <button class="tecla-num acao" data-digito="limpar">${t("ver todas", "show all")}</button>
      </div>
    </div>`;

  const seletor = numpad + (filtradas.length === 0
    ? `<p class="sem-resultados">${t("Nenhuma carreira com esse número.",
                                     "No route with that number.")}</p>`
    : `<div class="seletor-linhas">
        ${filtradas.map(n => `
          <button class="chip-linha ${app.linhaMapa === n ? "ativo" : ""}"
                  style="${app.linhaMapa === n ? `background:${LINHAS[n].cor}; border-color:${LINHAS[n].cor}` : ""}"
                  data-linha-mapa="${n}">${n}</button>`).join("")}
      </div>`);

  return `
    ${cabecalhoMapa()}
    ${seletor}

    ${!l ? `
      <div class="mapa-vazio">
        <span class="mapa-vazio-icone">${ICONES.mapa}</span>
        <p>${t("Escolha uma carreira para ver o percurso e os autocarros em circulação.",
               "Choose a route to see its path and the buses currently running.")}</p>
      </div>`
    : `
      <div class="linha-resumo" style="border-color:${l.cor}">
        <span class="cartao-linha-num" style="background:${l.cor}">${num}</span>
        <span class="linha-resumo-txt">
          <span class="linha-resumo-terminais">${l.terminais[0]} — ${l.terminais[1]}</span>
          <span class="linha-resumo-nota">
            ${temTempoReal()
              ? `${veiculos.length} ${t("em circulação", "in service")}`
              : t("posições indisponíveis", "positions unavailable")} ·
            ${l.servehospital
              ? t("passa nesta paragem", "stops here")
              : t("não passa nesta paragem", "does not stop here")}
          </span>
        </span>
        <button class="ver-horario" data-ver-horario="${num}">${t("Horário", "Times")}</button>
      </div>

      <div class="mapa-caixa">
        <svg id="mapa-svg" viewBox="0 0 1000 880" class="mapa-svg">
          ${desenharRuas()}
          ${Object.entries(MAPA.rotas).filter(([n]) => n !== num).map(([n, r]) =>
            `<path d="${r.d}" class="rota apagada"/>`).join("")}
          <path id="rota-${num}" d="${MAPA.rotas[num].d}" class="rota destaque"
                stroke="${l.cor}"/>
          ${l.paragens.map((_, i) =>
            `<circle id="pl-${i}" class="paragem-linha" r="13" fill="#0E1621"
                     stroke="${l.cor}" stroke-width="5"/>`).join("")}
          ${desenharParagens(true)}
          ${desenharVeiculos(veiculos)}
        </svg>
      </div>
      ${legendaMapa(true)}`}`;
}

function cabecalhoMapa() {
  return `

}

const desenharRuas = () => MAPA.ruas.map(d => `<path d="${d}" class="rua"/>`).join("");

const desenharPontos = () => MAPA.pontos.map((p, i) => !app.filtros[p.tipo] ? "" : `
  <g class="ponto ${app.pontoAberto === i ? "aberto" : ""}" data-ponto="${i}">
    <circle cx="${p.x}" cy="${p.y}" r="48" fill="transparent"/>
    <circle cx="${p.x}" cy="${p.y}" r="${app.pontoAberto === i ? 24 : 17}"
            fill="${TIPOS_PONTO[p.tipo].cor}" stroke="#0E1621" stroke-width="4"/>
    <text x="${p.x}" y="${p.y + 50}" class="ponto-nome">${p.nome}</text>
  </g>`).join("");

const desenharParagens = (soAtual = false) =>
  MAPA.paragens.filter(p => !soAtual || p.atual).map(p => `
    <g class="paragem">
      ${p.atual ? `<circle cx="${p.x}" cy="${p.y}" r="42" class="halo"/>` : ""}

              fill="${p.atual ? "#E30613" : "#0E1621"}"
              stroke="#FFFFFF" stroke-width="5"/>
      <text x="${p.x}" y="${p.y - (p.atual ? 60 : 34)}"
            class="paragem-nome ${p.atual ? "atual" : ""}">${p.nome}</text>
      <text x="${p.x}" y="${p.y - (p.atual ? 26 : 34) + 34}"
            class="paragem-linhas">${p.atual ? "" : p.linhas}</text>

/* Sem tempo real não se desenham autocarros. Mostrar a última posição

        <div class="alternativa">
          <strong>tub.pt</strong>
          <span>${t("Horários, tarifários e percursos", "Timetables, fares and routes")}</span>
        </div>
        <div class="alternativa">
          <strong>253 000 000</strong>
          <span>${t("Apoio ao cliente", "Customer support")}</span>
        </div>
      </div>
      <div class="rodape-tecnico">${SISTEMA.equipamento} · ${SISTEMA.versao}</div>
    </div>`;
}

/* Pilha de avisos, na zona habitual do ecrã. O prioritário já dispensado
   entra em vermelho e no topo; os avisos correntes ficam em âmbar por baixo.
   Tocar no vermelho reabre a sobreposição. */
function faixaAvisos() {
  let html = "";

  if (app.estado === ESTADOS.LEVANTADA) {
    html += `
      <div class="faixa-aviso critico" data-acao="reabrir-aviso">
        <span class="faixa-icone">${ICONES.alerta}</span>
        <span class="faixa-aviso-texto">
          <strong>${t(AVISO_PRIORITARIO.titulo, AVISO_PRIORITARIO.tituloEN)}:</strong>
          ${t(AVISO_PRIORITARIO.texto, AVISO_PRIORITARIO.textoEN)}
        </span>
      </div>`;
  }

  const a = AVISOS[0];
  if (a) {
    html += `
      <div class="faixa-aviso">
        <span class="faixa-icone">${ICONES.alerta}</span>
        <span class="faixa-aviso-texto">${t(a.texto, a.textoEN)}</span>
      </div>`;
  }
  return html;
}

function sobreposicaoAviso() {
  return `
    <div class="sobreposicao">
      <div class="aviso-painel">
        <div class="icone">${ICONES.alerta}</div>
        <h2>${t(AVISO_PRIORITARIO.titulo, AVISO_PRIORITARIO.tituloEN)}</h2>
        <p>${t(AVISO_PRIORITARIO.texto, AVISO_PRIORITARIO.textoEN)}</p>
      </div>
      <div class="aviso-continuar">
        <span class="toque-dedo">
          <span class="toque-onda"></span>
          <span class="toque-onda"></span>
          ${ICONES.toque}
        </span>
        ${t("Toque para continuar", "Touch to continue")}
      </div>
    </div>`;
}


/* ============================================================
   Composição: que ecrã mostrar em cada estado
   ============================================================ */
/* Coloca cada veículo no ponto correspondente do seu percurso. Usa a API
   de geometria do SVG, por isso só corre depois do elemento estar no DOM.
   Na versão real, o progresso é substituído pela posição vinda do GTFS-RT
   projetada sobre o traçado da linha. */
function posicionarVeiculos() {
  const svg = document.getElementById("mapa-svg");
  if (!svg) return;

  // Só os veículos visíveis no modo atual, pela mesma ordem da renderização
  const visiveis = app.mapaModo === "rede"
    ? (app.linhaMapa ? VEICULOS.filter(v => v.linha === app.linhaMapa) : [])
    : VEICULOS.filter(v => MAPA.rotas[v.linha].serveParagem);

  visiveis.forEach((v, i) => {
    const caminho = svg.querySelector(`#rota-${v.linha}`);
    const marca   = svg.querySelector(`#veiculo-${i}`);
    if (!caminho || !marca || !caminho.getTotalLength) return;
    const ponto = caminho.getPointAtLength(v.progresso * caminho.getTotalLength());
    marca.setAttribute("transform", `translate(${ponto.x}, ${ponto.y})`);
  });

  posicionarParagensLinha(svg);
}

/* No modo rede, distribui as paragens da carreira ao longo do traçado.
   A distribuição é uniforme porque o mapa é esquemático — com cartografia
   real, cada paragem tem coordenadas próprias e isto desaparece. */
function posicionarParagensLinha(svg) {
  if (app.mapaModo !== "rede" || !app.linhaMapa) return;
  const caminho = svg.querySelector(`#rota-${app.linhaMapa}`);
  if (!caminho || !caminho.getTotalLength) return;
  const total = caminho.getTotalLength();
  const paragens = LINHAS[app.linhaMapa].paragens;
  paragens.forEach((_, i) => {
    const marca = svg.querySelector(`#pl-${i}`);
    if (!marca) return;
    const ponto = caminho.getPointAtLength((i / (paragens.length - 1)) * total);
    marca.setAttribute("cx", ponto.x);
    marca.setAttribute("cy", ponto.y);
  });
}

function desenhar() {
  const palco = document.getElementById("palco");
  let html = "";

  switch (app.estado) {

    case ESTADOS.INATIVO:
      html = ecraPublicidade();
      break;

    case ESTADOS.MANUTENCAO:
      html = cabecalho() + ecraManutencao();
      break;

    /* Degradado e offline não substituem a interface: qualificam-na. A
       navegação mantém-se, porque horários, tarifários, lojas, percursos
       e mapa continuam válidos — só os tempos de espera é que não. */
    case ESTADOS.DEGRADADO:
    case ESTADOS.OFFLINE: {
      const inicio = app.estado === ESTADOS.DEGRADADO ? ecraDegradado : ecraOffline;
      const ecras = {
        inicio, horarios: ecraHorarios, tarifario: ecraTarifario,
        mapa: ecraMapa, info: ecraInfo
      };
      html = cabecalho() + avisoEstado() + (ecras[app.ecra] || inicio)();
      if (app.ecra === "inicio") html += navegacao();
      break;
    }

    case ESTADOS.PRIORIDADE:
      html = cabecalho() + ecraInicio() + navegacao() + sobreposicaoAviso();
      break;

    // Prioridade levantada: interface normal, com a faixa vermelha que
    // faixaAvisos() acrescenta. Partilha tudo o resto com o estado ativo.
    case ESTADOS.LEVANTADA:
    case ESTADOS.ATIVO:
    default:
      const ecras = {
        inicio:    () => ecraInicio(),
        horarios:  ecraHorarios,
        tarifario: ecraTarifario,
        mapa:      ecraMapa,
        info:      ecraInfo
      };
      html = cabecalho() + (ecras[app.ecra] || ecras.inicio)();
      if (app.ecra === "inicio") html += navegacao();
  }

  palco.innerHTML = html;
  document.body.classList.toggle("contraste", app.contraste);
  document.body.classList.toggle("altura-reduzida", app.alturaReduzida);
  posicionarVeiculos();
  ajustarEscala();
  atualizarDev();
}


/* ============================================================
   [5] ARRANQUE
   ============================================================ */

/* Escala o palco de 1080×1920 para caber na janela.

   O modo de altura reduzida NÃO desloca o palco: fazê-lo empurrava a barra
   de acessibilidade para fora do ecrã, cortando precisamente o botão que
   permite desligar o modo. Em vez disso, compacta o cabeçalho e manda os
   controlos para baixo por CSS, o que traz o conteúdo acionável para a
   zona alcançável por quem está sentado sem perder nada de vista. */
function ajustarEscala() {
  const palco = document.getElementById("palco");
  const escala = Math.min(window.innerWidth / 1080, window.innerHeight / 1920) * 0.97;
  palco.style.transform = `translate(-50%, -50%) scale(${escala})`;
}

/* Delegação de eventos: um único listener trata todos os toques */
document.addEventListener("click", e => {
  aoTocar();

  const alvo = e.target.closest("[data-ecra], [data-linha], [data-acao], [data-filtro], [data-ponto], [data-detalhe], [data-dia], [data-tecla], [data-modo], [data-linha-mapa], [data-ver-horario], [data-digito]");
  if (!alvo) return;

  if (alvo.dataset.ecra) {
    app.ecra = alvo.dataset.ecra;
    app.pontoAberto = null;
    app.linhaDetalhe = null;
    app.pesquisa = "";
    app.teclado = false;
  }
  if (alvo.dataset.linha) { app.linhaAberta = alvo.dataset.linha; }
  if (alvo.dataset.filtro) {
    const f = alvo.dataset.filtro;
    app.filtros[f] = !app.filtros[f];
    app.pontoAberto = null;          // o ponto aberto pode deixar de existir
  }
  if (alvo.dataset.detalhe) {
    app.linhaDetalhe = alvo.dataset.detalhe;
    app.sentido = 0;
    app.teclado = false;
  }
  if (alvo.dataset.dia) { app.diaTipo = alvo.dataset.dia; }
  if (alvo.dataset.modo) {
    app.mapaModo = alvo.dataset.modo;
    app.pontoAberto = null;
    app.filtroLinha = "";
  }
  if (alvo.dataset.digito) {
    const d = alvo.dataset.digito;
    if (d === "apagar")      app.filtroLinha = app.filtroLinha.slice(0, -1);
    else if (d === "limpar") app.filtroLinha = "";
    else if (app.filtroLinha.length < 3) app.filtroLinha += d;
    app.linhaMapa = null;
  }
  if (alvo.dataset.linhaMapa) {
    const n = alvo.dataset.linhaMapa;
    app.linhaMapa = app.linhaMapa === n ? null : n;   // segundo toque limpa
  }
  if (alvo.dataset.verHorario) {
    app.ecra = "horarios";
    app.linhaDetalhe = alvo.dataset.verHorario;
    app.diaTipo = "uteis";
    app.sentido = 0;
  }
  if (alvo.dataset.tecla) {
    const k = alvo.dataset.tecla;
    if (k === "apagar") app.pesquisa = app.pesquisa.slice(0, -1);
    else if (app.pesquisa.length < 24) app.pesquisa += k;
  }
  if (alvo.dataset.ponto !== undefined) {
    const i = Number(alvo.dataset.ponto);
    app.pontoAberto = app.pontoAberto === i ? null : i;   // segundo toque fecha
  }

  switch (alvo.dataset.acao) {
    case "contraste": app.contraste = !app.contraste; break;
    case "altura":    app.alturaReduzida = !app.alturaReduzida; break;
    case "idioma":    app.idioma = app.idioma === "pt" ? "en" : "pt"; break;
    case "aviso":
      app.avisoAtivo = true;
      irPara(ESTADOS.PRIORIDADE);
      return;
    case "limpar-aviso":
      app.avisoAtivo = false;
      clearTimeout(tReaparecer);
      if (app.estado === ESTADOS.PRIORIDADE ||
          app.estado === ESTADOS.LEVANTADA) irPara(ESTADOS.ATIVO);
      break;
    case "abrir-teclado":    app.teclado = true; break;
    case "fechar-teclado":   app.teclado = false; break;
    case "limpar-pesquisa":  app.pesquisa = ""; break;
    case "voltar-lista":     app.linhaDetalhe = null; break;
    case "inverter-sentido": app.sentido = app.sentido === 0 ? 1 : 0; break;
    case "fechar-ponto":
      app.pontoAberto = null;
      break;
    case "reabrir-aviso":
      irPara(ESTADOS.PRIORIDADE);
      return;
  }
  desenhar();
});

/* Relógio: redesenha o cabeçalho a cada minuto */
setInterval(() => {
  if (app.estado !== ESTADOS.INATIVO) desenhar();
}, 60000);

/* Simulação do polling do GTFS-RT (15–30 s no descritivo).
   Substituir por fetch("/api/chegadas") na versão real. */
setInterval(() => {
  CHEGADAS = CHEGADAS
    .map(c => ({ ...c, eta: c.eta - 1 }))
    .filter(c => c.eta > 0);
  if (CHEGADAS.length < 4) {
    const base = CHEGADAS[CHEGADAS.length - 1] || { eta: 20 };
    CHEGADAS.push({
      linha: ["2","13","42","88"][Math.floor(Math.random() * 4)],
      destino: "Universidade do Minho", destinoEN: "University of Minho",
      eta: base.eta + 5 + Math.floor(Math.random() * 6),
      tempoReal: true, acessivel: Math.random() > .4, atraso: 0
    });
  }
  app.ultimaSinc = new Date();
  desenhar();
}, 20000);

/* Avanço dos veículos. Só mexe quando o mapa está à vista — não vale a
   pena gastar ciclos a animar o que ninguém vê. Invertem o sentido ao
   chegar ao fim do percurso, simulando o retorno. */
setInterval(() => {
  if (app.ecra !== "mapa") return;
  VEICULOS.forEach(v => {
    v.progresso += v.velocidade;
    if (v.progresso > 1) { v.progresso = 1; v.velocidade *= -1; }
    if (v.progresso < 0) { v.progresso = 0; v.velocidade *= -1; }
  });
  posicionarVeiculos();
}, 450);

/* Rotação de campanhas no estado inativo */
setInterval(() => {
  if (app.estado === ESTADOS.INATIVO) { app.campanha++; desenhar(); }
}, 8000);

window.addEventListener("resize", ajustarEscala);

/* ---------- Painel de desenvolvimento ---------- */
document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "d") document.getElementById("dev").classList.toggle("aberto");
});

function atualizarDev() {
  const cx = document.getElementById("dev-estados");
  cx.innerHTML = Object.values(ESTADOS).map(s =>
    `<button data-estado="${s}" class="${app.estado === s ? "on" : ""}">${s}</button>`
  ).join("");
  cx.querySelectorAll("button").forEach(b =>
    b.onclick = ev => { ev.stopPropagation(); irPara(b.dataset.estado); });
}

app.diaTipo = tipoDiaHoje();
desenhar();
</script>
